services:

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-criskros}
      POSTGRES_USER: ${POSTGRES_USER:-criskros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-criskros}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Strapi CMS ───────────────────────────────────────────────────────
  strapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.strapi
    restart: always
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-criskros}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-criskros}
      DATABASE_SSL: "false"
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      URL: https://${CMS_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - strapi_uploads:/app/public/uploads
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-cms.rule=Host(`${CMS_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-cms.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-cms.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-cms.loadbalancer.server.port=1337"

  # ── API Server ───────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: always
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-criskros}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-criskros}
      STRAPI_URL: http://strapi:1337
      NODE_ENV: production
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:-criskros-portal-secret-change-in-production}
      PORTAL_ADMIN_TOKEN: ${PORTAL_ADMIN_TOKEN:-criskros-admin-2026}
    depends_on:
      postgres:
        condition: service_healthy
      strapi:
        condition: service_started
    networks:
      - internal

  # ── Frontend + Nginx ─────────────────────────────────────────────────
  # This container serves static files and internally proxies /api/ and /admin/
  # Traefik routes external HTTPS traffic here based on DOMAIN
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    restart: always
    volumes:
      # Mount nginx config from host so changes survive rebuilds and restarts
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - proxy        # connects to the shared Traefik proxy network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Route the domain (set DOMAIN=criskros.com to also match www automatically, or set full www.criskros.com for www-only)
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80"
    depends_on:
      - api
      - strapi

networks:
  internal:
    driver: bridge
  proxy:
    external: true   # shared Traefik network — created by deploy/proxy/docker-compose.yml

volumes:
  postgres_data:
  strapi_uploads:

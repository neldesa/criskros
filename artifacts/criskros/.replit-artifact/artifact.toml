kind = "web"
previewPath = "/"
title = "Criskros"
version = "1.0.0"
id = "artifacts/criskros"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20301
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/criskros run dev"

[services.env]
PORT = "20301"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/criskros", "run", "build"]
publicDir = "artifacts/criskros/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
